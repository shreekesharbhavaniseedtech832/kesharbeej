<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Kesharbhavani Seedtech</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">
    <img src="logo.png">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <div class="slider">
    <img src="bajra1.png" class="slide active">
    <img src="cotton.png" class="slide">
    <img src="cumin.png" class="slide">
  </div>

  <div class="hero-text">
    <h1>Premium Seeds Company</h1>
    <p>Grow More, Earn More 🌾</p>
    <a href="https://wa.me/917096438261" class="btn">WhatsApp Now</a>
  </div>
</section>

<!-- Products -->
<section id="products" class="products">
  <h2>Our Products</h2>

  <input type="text" id="search" placeholder="Search product...">

  <div class="card-container">

    <div class="card" data-name="bajra">
      <img src="bajra1.png">
      <h3>Bajra</h3>
      <button onclick="order('Bajra')">Order</button>
    </div>

    <div class="card" data-name="cotton">
      <img src="cotton.png">
      <h3>Cotton</h3>
      <button onclick="order('Cotton')">Order</button>
    </div>

    <div class="card" data-name="cumin">
      <img src="cumin.png">
      <h3>Cumin</h3>
      <button onclick="order('Cumin')">Order</button>
    </div>

  </div>
</section>

<!-- Contact -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>

  <a href="tel:7096438261" class="btn call">📞 Call Now</a>
  <a href="https://wa.me/917096438261" class="btn whatsapp">💬 WhatsApp</a>

</section>

<script src="script.js"></script>

</body>
</html>
<script src="script.js"></script>

</body>
</html>
